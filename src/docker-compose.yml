version: '3.8'

services:
  # 1. 資料庫服務
  db:
    image: postgres:14
    container_name: sensei-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 2rligaoi
      POSTGRES_DB: sensei_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # 2. 爬蟲與網頁服務
  app:
    build: .
    container_name: sensei-app
    restart: always
    depends_on:
      - db
    env_file:
      - .env
    ports:
      - "8503:8501"
    volumes:
      - .:/app
    command: streamlit run src/app.py --server.port 8501 --server.address 0.0.0.0

# 🔴 關鍵：必須在這裡宣告，否則會噴 undefined volume 錯誤
volumes:
  postgres_data: