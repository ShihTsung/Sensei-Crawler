services:
  db:
    image: postgres:14
    container_name: sensei-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: sensei-app
    restart: always
    depends_on:
      - db
    env_file:
      - .env  # 讓 Docker 自動去讀取該台電腦的 .env 檔案
    ports:
      - "8503:8501"
    volumes:
      - .:/app
    command: streamlit run src/app.py --server.port 8501 --server.address 0.0.0.0

volumes:
  postgres_data: