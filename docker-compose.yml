services:
  db:
    image: postgres:14
    container_name: sensei-db
    restart: always  # <-- 關鍵：重開機或 Docker 重啟後自動恢復
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 2rligaoi
      POSTGRES_DB: sensei_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: sensei-app
    restart: always
    depends_on:
      - db
    env_file:
      - .env
    ports:
      - "8503:8501"  # 將 Mac 的 8503 對接到容器內的 8501
    volumes:
      - .:/app
    # 補上下這行，強迫 Streamlit 對外開放連線
    command: streamlit run src/app.py --server.port 8501 --server.address 0.0.0.0