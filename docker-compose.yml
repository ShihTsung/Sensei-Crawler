services:
  db:
    image: postgres:14
    container_name: sensei-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-sensei_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: sensei-app
    restart: always
    depends_on:
      - db
    # 解決 DNS_PROBE_FINISHED_NXDOMAIN，直接定義 IP 對應
    extra_hosts:
      - "data.tdcc.com.tw:117.56.213.165"
    env_file:
      - .env
    ports:
      - "8503:8501"
    volumes:
      - .:/app
    command: streamlit run src/app.py --server.port 8501 --server.address 0.0.0.0

volumes:
  postgres_data: