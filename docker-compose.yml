version: '3.8'

services:
  db:
    image: postgres:14
    container_name: sensei-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 2rligaoi
      POSTGRES_DB: sensei_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: sensei-app
    depends_on:
      - db
    env_file:
      - .env
    ports:
      - "8501:8501"

volumes:
  postgres_data: