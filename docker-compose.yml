services:
  db:
    image: postgres:14
    container_name: sensei-db
    restart: always  # <-- 關鍵：重開機或 Docker 重啟後自動恢復
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 2rligaoi
      POSTGRES_DB: sensei_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: sensei-app
    restart: always  # <-- 關鍵：確保 Web 介面隨時待命
    depends_on:
      - db
    env_file:
      - .env
    ports:
      - "8503:8503"
    volumes:
      - .:/app

volumes:
  postgres_data: