services:
  db:
    image: postgres:14
    container_name: sensei-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-sensei_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-sensei_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: sensei-app
    restart: always
    depends_on:
      db:
        condition: service_healthy
    extra_hosts:
      - "data.tdcc.com.tw:${TDCC_IP:-117.56.213.165}"
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app/src
    ports:
      - "8503:8501"
    volumes:
      - .:/app
    command: streamlit run src/app.py --server.port 8501 --server.address 0.0.0.0

  intraday:
    build: .
    container_name: sensei-intraday
    restart: always
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app/src
    volumes:
      - .:/app
    command: python src/intraday_sync.py

volumes:
  postgres_data:
